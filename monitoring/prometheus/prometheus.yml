global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: 'metarang-cluster'
    environment: 'development'

rule_files:
  - "recording_rules.yml"
  - "alerting_rules.yml"

# Alertmanager configuration (optional - uncomment when alertmanager is deployed)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Primary: aggregated service health, DB, cache, and dependency metrics
  - job_name: 'health-check-service'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['health-check-service:8090']
        labels:
          service: 'health-check-service'
          type: 'monitoring'
    metrics_path: '/metrics'

  # API Gateway — Golden Signals (latency, traffic, errors)
  - job_name: 'kong'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['kong:8001']
        labels:
          service: 'kong'
          type: 'api-gateway'
    metrics_path: '/metrics'

  # Host infrastructure (CPU, memory, disk, network)
  - job_name: 'node-exporter'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
          type: 'infrastructure'

  # Individual microservices expose /metrics on port 9090 (METRICS_PORT)
  - job_name: 'auth-service'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['auth-service:9090']
        labels:
          service: 'auth-service'
    metrics_path: '/metrics'

