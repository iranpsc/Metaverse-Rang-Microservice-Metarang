groups:
  # Critical alerts — immediate response required (MICROSERVICE_METRICS.md)
  - name: critical_alerts
    rules:
      - alert: ServiceDown
        expr: service_health_status == 0
        for: 1m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "Service {{ $labels.service }} is down"
          description: "Service {{ $labels.service }} ({{ $labels.display_name }}) has been unhealthy for more than 1 minute."

      - alert: HighErrorRate
        expr: metarang:service_error_percentage > 5
        for: 5m
        labels:
          severity: critical
          category: errors
        annotations:
          summary: "High microservice error rate"
          description: "{{ $value | printf \"%.2f\" }}% of monitored services are unhealthy (threshold: 5%)."

      - alert: HighGatewayErrorRate
        expr: metarang:http_error_percentage:5m > 5
        for: 5m
        labels:
          severity: critical
          category: errors
        annotations:
          summary: "High API gateway 5xx error rate"
          description: "Gateway 5xx error rate is {{ $value | printf \"%.2f\" }}% (threshold: 5%)."

      - alert: HighP99Latency
        expr: metarang:http_latency_p99:5m > 1
        for: 5m
        labels:
          severity: critical
          category: latency
        annotations:
          summary: "P99 latency exceeds 1 second"
          description: "P99 request latency is {{ $value | printf \"%.2f\" }}s (threshold: 1s)."

      - alert: HighCPUUsage
        expr: metarang:node_cpu_usage_percentage > 90
        for: 5m
        labels:
          severity: critical
          category: saturation
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | printf \"%.2f\" }}% (threshold: 90%)."

      - alert: HighMemoryUsage
        expr: metarang:node_memory_usage_percentage > 95
        for: 2m
        labels:
          severity: critical
          category: saturation
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | printf \"%.2f\" }}% (threshold: 95%)."

      - alert: ScrapeTargetDown
        expr: up{job=~"health-check-service|kong|node-exporter"} == 0
        for: 2m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "Monitoring target {{ $labels.job }} is down"
          description: "Prometheus cannot scrape {{ $labels.job }} at {{ $labels.instance }}."

  # Warning alerts — investigation needed
  - name: warning_alerts
    rules:
      - alert: ModerateErrorRate
        expr: metarang:service_error_percentage > 1
        for: 10m
        labels:
          severity: warning
          category: errors
        annotations:
          summary: "Moderate microservice error rate"
          description: "{{ $value | printf \"%.2f\" }}% of services are unhealthy (threshold: 1%)."

      - alert: ModerateGatewayErrorRate
        expr: metarang:http_error_percentage:5m > 1
        for: 10m
        labels:
          severity: warning
          category: errors
        annotations:
          summary: "Moderate API gateway 5xx error rate"
          description: "Gateway 5xx error rate is {{ $value | printf \"%.2f\" }}% (threshold: 1%)."

      - alert: HighP95Latency
        expr: metarang:http_latency_p95:5m > 0.5
        for: 10m
        labels:
          severity: warning
          category: latency
        annotations:
          summary: "P95 latency exceeds 500ms"
          description: "P95 request latency is {{ $value | printf \"%.2f\" }}s (threshold: 500ms)."

      - alert: ModerateCPUUsage
        expr: metarang:node_cpu_usage_percentage > 70
        for: 15m
        labels:
          severity: warning
          category: saturation
        annotations:
          summary: "Moderate CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | printf \"%.2f\" }}% (threshold: 70%)."

      - alert: LowCacheHitRate
        expr: cache_hit_rate < 80
        for: 10m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "Low Redis cache hit rate"
          description: "Cache hit rate is {{ $value | printf \"%.2f\" }}% (threshold: 80%)."

      - alert: DatabaseConnectionIssues
        expr: db_connection_status == 0
        for: 2m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "Database connection failure for {{ $labels.service }}"
          description: "Service {{ $labels.service }} cannot connect to database at {{ $labels.host }}."

      - alert: CacheUnavailable
        expr: cache_status == 0
        for: 2m
        labels:
          severity: warning
          category: cache
        annotations:
          summary: "Redis cache is unavailable"
          description: "Cache health check reports Redis is down."

      - alert: ExternalAPIDown
        expr: external_api_status == 0
        for: 5m
        labels:
          severity: warning
          category: dependencies
        annotations:
          summary: "External API {{ $labels.name }} is down"
          description: "External dependency {{ $labels.name }} ({{ $labels.url }}) is unhealthy."

      - alert: DatabaseConnectionPoolHigh
        expr: |
          (
            db_connection_pool_in_use{service!="legacy",service!="health-check-service"}
            /
            db_connection_pool_open{service!="legacy",service!="health-check-service"}
          ) > 0.9
        for: 5m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "Database connection pool nearly exhausted for {{ $labels.service }}"
          description: "Service {{ $labels.service }} is using {{ $value | humanizePercentage }} of its connection pool."

  # Per-service alerts (when services expose /metrics on port 9090)
  - name: service_metrics_alerts
    rules:
      - alert: HighServiceP99Latency
        expr: |
          histogram_quantile(0.99,
            sum(rate(metarang_auth_service_request_duration_seconds_bucket[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: critical
          category: latency
        annotations:
          summary: "High P99 gRPC latency on auth-service"
          description: "Auth service P99 latency exceeds 1 second."

      - alert: HighServiceErrorRate
        expr: |
          (
            sum(rate(metarang_auth_service_requests_total{status!="ok"}[5m]))
            / sum(rate(metarang_auth_service_requests_total[5m]))
          ) * 100 > 5
          and sum(rate(metarang_auth_service_requests_total[5m])) > 0
        for: 5m
        labels:
          severity: critical
          category: errors
        annotations:
          summary: "High gRPC error rate on auth-service"
          description: "Auth service error rate is {{ $value | printf \"%.2f\" }}% (threshold: 5%)."

  # Info alerts — monitoring and tracking
  - name: info_alerts
    rules:
      - alert: ServiceRecovered
        expr: service_health_status == 1
        for: 1m
        labels:
          severity: info
          category: availability
        annotations:
          summary: "Service {{ $labels.service }} has recovered"
          description: "Service {{ $labels.service }} is now healthy."

      - alert: HighTrafficSpike
        expr: |
          metarang:http_requests_per_second:5m
          >
          (avg_over_time(metarang:http_requests_per_second:5m[1h]) * 2)
          and avg_over_time(metarang:http_requests_per_second:5m[1h]) > 0.1
        for: 5m
        labels:
          severity: info
          category: traffic
        annotations:
          summary: "High traffic spike detected"
          description: "Request rate ({{ $value | printf \"%.2f\" }} RPS) is more than 2x the 1-hour average."

      - alert: MonitoringOperational
        expr: up{job="health-check-service"} == 1
        for: 30s
        labels:
          severity: info
          category: deployment
        annotations:
          summary: "Health check monitoring is operational"
          description: "Health-check-service metrics endpoint is reachable."
