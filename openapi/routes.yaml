# Route registry for metarang REST API (Laravel-compatible paths via grpc-gateway).
# Path and query parameters are auto-discovered from grpc-gateway handlers.
# Run `make openapi` to regenerate openapi/openapi.yaml from this file + handler discovery.

routes:
  # --- Auth ---
  - path: /api/auth/register
    methods: [post]
    tag: Auth
    summary: Start OAuth registration flow
    security: guest
  - path: /api/auth/redirect
    methods: [get]
    tag: Auth
    summary: Redirect to OAuth provider
    security: guest
  - path: /api/auth/callback
    methods: [get]
    tag: Auth
    summary: OAuth callback handler
    security: none
  - path: /api/auth/validate
    methods: [post]
    tag: Auth
    summary: Validate bearer token
    security: none
  - path: /api/auth/me
    methods: [get]
    tag: Auth
    summary: Get authenticated user profile
    security: bearer
  - path: /api/auth/logout
    methods: [post]
    tag: Auth
    summary: Log out current user
    security: bearer

  # --- Account Security ---
  - path: /api/account/security
    methods: [post]
    tag: Account Security
    summary: Request account security verification
    security: bearer
  - path: /api/account/security/verify
    methods: [post]
    tag: Account Security
    summary: Verify account security code
    security: bearer

  # --- Wallet (Web3) ---
  - path: /api/wallet/link/nonce
    methods: [get]
    tag: Wallet
    summary: Get wallet link nonce
    security: bearer
  - path: /api/wallet/link
    methods: [post]
    tag: Wallet
    summary: Link Web3 wallet to account
    security: bearer
  - path: /api/wallet/security/nonce
    methods: [get]
    tag: Wallet
    summary: Get wallet security nonce
    security: bearer
  - path: /api/wallet/security/verify
    methods: [post]
    tag: Wallet
    summary: Verify wallet security signature
    security: bearer

  # --- Users ---
  - path: /api/users
    methods: [get]
    tag: Users
    summary: List users
    security: optional
  - path: /api/user
    methods: [get]
    tag: Users
    summary: Get user by query parameter
    security: optional
  - path: /api/user/wallet
    methods: [get]
    tag: Users
    summary: Get authenticated user wallet
    security: bearer
  - path: /api/user/profile
    methods: [put, patch]
    tag: Users
    summary: Update authenticated user profile
    security: bearer
  - path: /api/users/{user}
    methods: [get]
    tag: Users
    summary: Get user profile by ID or code
    security: optional
  - path: /api/users/{user}/features
    methods: [get]
    tag: Users
    summary: List user features
    security: optional
  - path: /api/users/{user}/followers
    methods: [get]
    tag: Users
    summary: List user followers
    security: optional
  - path: /api/users/{user}/following
    methods: [get]
    tag: Users
    summary: List users followed by user
    security: optional

  # --- Citizen ---
  - path: /api/citizen/{code}
    methods: [get]
    tag: Citizen
    summary: Get citizen public profile
    security: none
  - path: /api/citizen/{code}/features/summary
    methods: [get]
    tag: Citizen
    summary: Per-karbari feature summary cards (current, bought, sold) for a period
    security: none
    params:
      - name: code
        in: path
        type: string
        description: Citizen code
        example: HM-2000000
      - name: period
        in: query
        type: string
        description: Time window for bought/sold counts (`daily`, `weekly`, `monthly`, or `yearly`). Defaults to `daily`.
        example: weekly
      - name: karbari
        in: query
        type: array
        description: Optional filter to specific karbari codes (e.g. `t`, `m`, `a`). Privacy settings still apply.
        example: [t, m]
  - path: /api/citizen/{code}/features/chart
    methods: [get]
    tag: Citizen
    summary: Bought vs sold feature timeline chart for a period
    security: none
    params:
      - name: code
        in: path
        type: string
        description: Citizen code
        example: HM-2000000
      - name: period
        in: query
        type: string
        description: Time window (`daily`, `weekly`, `monthly`, or `yearly`). Defaults to `daily`.
        example: weekly
      - name: karbari
        in: query
        type: array
        description: Optional filter to specific karbari codes. Privacy settings still apply.
        example: [t]
  - path: /api/citizen/{code}/features
    methods: [get]
    tag: Citizen
    summary: Paginated searchable feature list with map markers
    security: none
    params:
      - name: code
        in: path
        type: string
        description: Citizen code
        example: HM-2000000
      - name: karbari
        in: query
        type: array
        description: Optional filter to specific karbari codes (affects list and map markers). Privacy settings still apply.
        example: [t]
      - name: search
        in: query
        type: string
        description: Optional search by feature properties ID or address (affects list/count only, not map markers)
        example: TO111
      - name: page
        in: query
        type: integer
        description: Page number
        example: 1
      - name: per_page
        in: query
        type: integer
        description: Items per page (default 15)
        example: 15

  - path: /api/citizen/{code}/wallet/history/summary
    methods: [get]
    tag: Citizen
    summary: Citizen wallet asset history summary cards
    security: none
    params:
      - name: code
        in: path
        type: string
        description: Citizen code
        example: HM-2000000
      - name: period
        in: query
        type: string
        description: Required time window (`daily`, `weekly`, `monthly`, or `yearly`)
        example: weekly
      - name: assets
        in: query
        type: array
        description: Optional filter by asset names (`psc`, `irr`, `red`, `blue`, `yellow`, `satisfaction`, `effect`)
        example: [psc, irr]
  - path: /api/citizen/{code}/wallet/history/chart
    methods: [get]
    tag: Citizen
    summary: Citizen wallet asset history income/spending chart
    security: none
    params:
      - name: code
        in: path
        type: string
        description: Citizen code
        example: HM-2000000
      - name: period
        in: query
        type: string
        description: Required time window (`daily`, `weekly`, `monthly`, or `yearly`)
        example: weekly
      - name: assets
        in: query
        type: array
        description: Optional filter by asset names
        example: [psc]

  # --- Search ---
  - path: /api/search/users
    methods: [get]
    tag: Search
    summary: Search users
    security: optional
  - path: /api/search/features
    methods: [get]
    tag: Search
    summary: Search features
    security: optional
  - path: /api/search/isic-codes
    methods: [get]
    tag: Search
    summary: Search ISIC codes
    security: optional

  # --- KYC ---
  - path: /api/kyc
    methods: [get, put, patch]
    tag: KYC
    summary: Get or update KYC information
    security: bearer
  - path: /api/bank-accounts
    methods: [get, post]
    tag: KYC
    summary: List or create bank accounts
    security: verified_email
  - path: /api/bank-accounts/{id}
    methods: [get, put, patch, delete]
    tag: KYC
    summary: Manage a bank account
    security: verified_email

  # --- Personal Info ---
  - path: /api/personal-info
    methods: [get, put, patch]
    tag: Personal Info
    summary: Get or update personal information
    security: bearer

  # --- Profile Limitations ---
  - path: /api/profile-limitations
    methods: [post]
    tag: Profile
    summary: Create profile limitation
    security: bearer
  - path: /api/profile-limitations/{id}
    methods: [put, patch, delete]
    tag: Profile
    summary: Update or delete profile limitation
    security: bearer
  - path: /api/users/{user}/profile-limitations
    methods: [get]
    tag: Profile
    summary: Get mutual profile limitation between caller and user
    security: bearer

  # --- Profile Photos ---
  - path: /api/profile-photos
    methods: [get, post]
    tag: Profile
    summary: List or upload profile photos
    security: bearer
  - path: /api/profile-photos/{id}
    methods: [get, delete]
    tag: Profile
    summary: Get or delete profile photo
    security: bearer

  # --- Settings ---
  - path: /api/settings
    methods: [get, post]
    tag: Settings
    summary: Get or update user settings
    security: bearer
  - path: /api/general-settings
    methods: [get]
    tag: Settings
    summary: Get general settings
    security: bearer
  - path: /api/general-settings/{key}
    methods: [put]
    tag: Settings
    summary: Update general setting
    security: bearer
  - path: /api/privacy
    methods: [get, post]
    tag: Settings
    summary: Get or update privacy settings
    security: bearer

  # --- User Events ---
  - path: /api/events
    methods: [get]
    tag: Events
    summary: List user events
    security: bearer
  - path: /api/events/{id}
    methods: [get]
    tag: Events
    summary: Get user event
    security: bearer
  - path: /api/events/{id}/report/{user}
    methods: [post]
    tag: Events
    summary: Report user event
    security: bearer

  # --- Calendar ---
  - path: /api/calendar
    methods: [get]
    tag: Calendar
    summary: List calendar events
    security: optional
  - path: /api/calendar/{id}
    methods: [get]
    tag: Calendar
    summary: Get calendar event
    security: optional
  - path: /api/calendar/filter
    methods: [get]
    tag: Calendar
    summary: Filter calendar events by date range
    security: optional
  - path: /api/calendar/latest-version
    methods: [get]
    tag: Calendar
    summary: Get latest calendar version
    security: optional
  - path: /api/calendar/events/{id}/interactions
    methods: [post]
    tag: Calendar
    summary: Add calendar event interaction
    security: bearer

  # --- Dynasty ---
  - path: /api/dynasty
    methods: [get]
    tag: Dynasty
    summary: Get user dynasty or available features
    security: bearer
  - path: /api/dynasty/create/{feature}
    methods: [post]
    tag: Dynasty
    summary: Create dynasty with feature
    security: bearer
  - path: /api/dynasty/{dynasty}/update/{feature}
    methods: [post]
    tag: Dynasty
    summary: Update dynasty feature
    security: bearer
  - path: /api/dynasty/{dynasty}/family/{family}
    methods: [get]
    tag: Dynasty
    summary: Get dynasty family
    security: bearer
  - path: /api/dynasty/requests/sent
    methods: [get]
    tag: Dynasty
    summary: List sent join requests
    security: bearer
  - path: /api/dynasty/requests/sent/{joinRequest}
    methods: [get, delete]
    tag: Dynasty
    summary: View or delete sent join request
    security: bearer
  - path: /api/dynasty/requests/recieved
    methods: [get]
    tag: Dynasty
    summary: List received join requests
    security: bearer
  - path: /api/dynasty/requests/recieved/{joinRequest}
    methods: [get, post, delete]
    tag: Dynasty
    summary: View, accept, or reject received join request
    security: bearer
  - path: /api/dynasty/add/member/get/permissions
    methods: [post]
    tag: Dynasty
    summary: Get default member permissions
    security: bearer
  - path: /api/dynasty/add/member
    methods: [post]
    tag: Dynasty
    summary: Send dynasty join request
    security: bearer
  - path: /api/dynasty/search
    methods: [post]
    tag: Dynasty
    summary: Search users for dynasty
    security: bearer
  - path: /api/dynasty/prizes
    methods: [get]
    tag: Dynasty
    summary: List dynasty prizes
    security: bearer
  - path: /api/dynasty/prizes/{recievedPrize}
    methods: [get, post]
    tag: Dynasty
    summary: View or claim dynasty prize
    security: bearer
  - path: /api/dynasty/children/{user}
    methods: [post]
    tag: Dynasty
    summary: Update child permissions
    security: bearer

  # --- Features ---
  - path: /api/features
    methods: [get]
    tag: Features
    summary: List features
    security: optional
  - path: /api/features/buildings/completed
    methods: [get]
    tag: Features
    summary: List construction-completed buildings (paginated, 10 per page)
    security: none
  - path: /api/isic-codes
    methods: [get]
    tag: Features
    summary: List ISIC codes (paginated, 10 per page; optional search by name or code)
    security: optional
    params:
      - name: page
        in: query
        type: integer
        description: Page number for pagination
      - name: search
        in: query
        type: string
        description: Optional filter by ISIC code name or numeric code
  - path: /api/features/{id}
    methods: [get]
    tag: Features
    summary: Get feature details
    security: optional
    params:
      - name: id
        in: path
        type: integer
        format: int64
        description: Feature ID
        example: 1
  - path: /api/features/{feature}/trade-history
    methods: [get]
    tag: Features
    summary: Get feature trade history
    security: none
    params:
      - name: feature
        in: path
        type: integer
        format: int64
        description: Feature ID
        example: 1
      - name: page
        in: query
        type: integer
        description: Page number for pagination
  - path: /api/features/{feature}/build/buildings
    methods: [get]
    tag: Features
    summary: List buildings on a feature
    security: optional
    params:
      - name: feature
        in: path
        type: integer
        format: int64
        description: Feature ID
        example: 1
  - path: /api/features/{feature}/build/buildings/{buildingModel}
    methods: [put, delete]
    tag: Features
    summary: Update building construction or destroy building
    security: bearer
    params:
      - name: feature
        in: path
        type: integer
        format: int64
        description: Feature ID
        example: 1
      - name: buildingModel
        in: path
        type: string
        description: Building model identifier (3D model_id or local building_models.id)
        example: "1001"
  - path: /api/features/{feature}/build/buildings/{buildingModel}
    methods: [patch]
    tag: Features
    summary: Patch building information and return updated information
    security: bearer
    params:
      - name: feature
        in: path
        type: integer
        format: int64
        description: Feature ID
        example: 1
      - name: buildingModel
        in: path
        type: string
        description: Building model identifier (3D model_id or local building_models.id)
        example: "1001"
  - path: /api/my-features
    methods: [get]
    tag: Features
    summary: List authenticated user features
    security: bearer
  - path: /api/buy-requests
    methods: [get, post]
    tag: Features
    summary: List or create buy requests
    security: bearer
  - path: /api/buy-requests/{id}
    methods: [get, put, patch, delete]
    tag: Features
    summary: Manage buy request
    security: bearer
  - path: /api/sell-requests
    methods: [get, post]
    tag: Features
    summary: List or create sell requests
    security: bearer
  - path: /api/sell-requests/{id}
