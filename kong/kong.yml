_format_version: "3.0"
_transform: true

services:
  # Static uploaded files (profile photos, KYC, etc.) — not API calls
  - name: storage-uploads
    url: http://storage-service:8059
    protocol: http
    host: storage-service
    port: 8059
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 3

  - name: grpc-gateway
    url: http://grpc-gateway:8080
    protocol: http
    host: grpc-gateway
    port: 8080
    path: /
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 5

  - name: swagger-ui
    url: http://swagger-ui:8080
    protocol: http
    host: swagger-ui
    port: 8080
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 3

routes:
  # Higher priority: serve files from storage-service, never grpc-gateway
  - name: uploads-static
    service: storage-uploads
    paths:
      - /uploads
    strip_path: false
    preserve_host: false
    regex_priority: 100
    protocols:
      - http
      - https
    methods:
      - GET
      - HEAD
      - OPTIONS

  - name: api-routes
    service: grpc-gateway
    paths:
      - /api
    strip_path: false
    preserve_host: false
    protocols:
      - http
      - https
    methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    regex_priority: 95

  # OpenAPI documentation (Swagger UI) — catch-all at /; lower priority than /api and /uploads
  - name: api-docs
    service: swagger-ui
    paths:
      - /
    strip_path: true
    preserve_host: false
    protocols:
      - http
      - https
    methods:
      - GET
      - HEAD
      - OPTIONS
    regex_priority: 10

plugins:
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true
  - name: rate-limiting
    config:
      minute: 60
      policy: redis
      redis:
        host: redis
        port: 6379
  - name: cors
    config:
      origins:
        - https://world.metarang.com
        - https://metarang.com
        - http://localhost:5173
        - http://localhost:5175
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Language
        - Content-Language
        - Content-Type
        - Authorization
        - X-Requested-With
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600
      preflight_continue: false
