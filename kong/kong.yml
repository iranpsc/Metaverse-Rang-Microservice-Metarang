_format_version: "3.0"
_transform: true

services:
  # Static uploaded files (profile photos, KYC, etc.) — not API calls
  - name: storage-uploads
    url: http://storage-service:8059
    protocol: http
    host: storage-service
    port: 8059
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 3

  - name: grpc-gateway
    url: http://grpc-gateway:8080
    protocol: http
    host: grpc-gateway
    port: 8080
    path: /
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 5

  # Calendar REST API — served directly by calendar-service (migrated off grpc-gateway)
  - name: calendar-service
    url: http://calendar-service:8060
    protocol: http
    host: calendar-service
    port: 8060
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 3

  # Features REST API — served directly by features-service (migrated off grpc-gateway)
  - name: features-service
    url: http://features-service:8062
    protocol: http
    host: features-service
    port: 8062
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 3

  - name: swagger-ui
    url: http://swagger-ui:8080
    protocol: http
    host: swagger-ui
    port: 8080
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 3

routes:
  # Higher priority: serve files from storage-service, never grpc-gateway
  - name: uploads-static
    service: storage-uploads
    paths:
      - /uploads
    strip_path: false
    preserve_host: false
    regex_priority: 100
    protocols:
      - http
      - https
    methods:
      - GET
      - HEAD
      - OPTIONS

  # Calendar API — higher priority than catch-all /api → grpc-gateway
  - name: calendar-api
    service: calendar-service
    paths:
      - /api/calendar
    strip_path: false
    preserve_host: false
    regex_priority: 98
    protocols:
      - http
      - https
    methods:
      - GET
      - POST
      - OPTIONS
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          policy: redis
          redis:
            host: redis
            port: 6379

  # Features API — higher priority than catch-all /api → grpc-gateway
  - name: features-api
    service: features-service
    paths:
      - /api/features
      - /api/isic-codes
      - /api/my-features
      - /api/buy-requests
      - /api/sell-requests
      - /api/hourly-profits
      - /api/maps
      - ~/api/citizen/[^/]+/features
      - ~/api/citizen/[^/]+/buildings
    strip_path: false
    preserve_host: false
    regex_priority: 98
    protocols:
      - http
      - https
    methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          policy: redis
          redis:
            host: redis
            port: 6379

  # CORS preflight for /api — no rate-limiting (429 without ACAO looks like a CORS failure).
  - name: api-preflight
    service: grpc-gateway
    paths:
      - /api
    strip_path: false
    preserve_host: false
    protocols:
      - http
      - https
    methods:
      - OPTIONS
    regex_priority: 96

  - name: api-routes
    service: grpc-gateway
    paths:
      - /api
    strip_path: false
    preserve_host: false
    protocols:
      - http
      - https
    methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
    regex_priority: 95
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          policy: redis
          redis:
            host: redis
            port: 6379

  # OpenAPI documentation (Swagger UI) — catch-all at /; lower priority than /api and /uploads
  - name: api-docs
    service: swagger-ui
    paths:
      - /
    strip_path: true
    preserve_host: false
    protocols:
      - http
      - https
    methods:
      - GET
      - HEAD
      - OPTIONS
    regex_priority: 10

plugins:
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true
  - name: cors
    config:
      # Exact origins + PCRE for local Vite/dev (localhost and 127.0.0.1, any port).
      # credentials:true forbids Origin:* — Kong must echo a matching origin.
      origins:
        - https://world.metarang.com
        - https://metarang.com
        - http://localhost:5173
        - http://localhost:5175
        - 'http://localhost:\d+'
        - 'http://127\.0\.0\.1:\d+'
      methods:
        - GET
        - HEAD
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Language
        - Content-Language
        - Content-Type
        - Authorization
        - X-Requested-With
        - Origin
        - X-Request-Id
        - sentry-trace
        - baggage
        - traceparent
        - tracestate
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600
      # Kong answers OPTIONS; do not proxy preflight to grpc-gateway (avoids ACAO:* clash).
      preflight_continue: false
