apiVersion: v1
kind: ConfigMap
metadata:
  name: shared-config
  namespace: metarang
data:
  # Database configuration
  mysql-host: "mysql"
  mysql-port: "3306"
  mysql-database: "metarang_db"
  mysql-user: "metarang"
  
  # Redis configuration
  redis-host: "redis"
  redis-port: "6379"
  
  # OAuth configuration (update with actual values)
  oauth-server-url: "https://sso.metarang.com"
  oauth-client-id: "metarang-client-id"
  
  # Application configuration
  app-url: "https://api.metarang.com"
  ftp-endpoint: "ftp://ftp.metarang.com"
  
  # Kavenegar SMS
  kavenegar-api-key: ""
  
  # Parsian Payment
  parsian-merchant-id: ""
  parsian-callback-url: "https://api.metarang.com/api/parsian/callback"
  
  # Logging
  log-level: "info"

  # Sentry Error Monitoring
  sentry-environment: "production"
  sentry-release: ""
  sentry-traces-sample-rate: "0"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: metarang
type: Opaque
stringData:
  # OAuth secrets
  oauth-client-secret: "changeme-oauth-secret"
  
  # Database password
  mysql-password: "changeme-password"
  
  # API keys
  kavenegar-api-key: "changeme-kavenegar-key"
  parsian-pin: "changeme-parsian-pin"
  
  # JWT secret for Sanctum
  jwt-secret: "changeme-jwt-secret"

  # Sentry DSN (optional — leave empty to disable)
  sentry-dsn: ""

