# Enable automatic sidecar injection for the metarang namespace
# Apply with: kubectl apply -f namespace-injection.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: metarang
  labels:
    istio-injection: enabled
    name: metarang
---
# Istio system namespace
apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
  labels:
    name: istio-system

