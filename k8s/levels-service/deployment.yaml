apiVersion: apps/v1
kind: Deployment
metadata:
  name: levels-service
  namespace: metarang
  labels:
    app: levels-service
    version: v1
spec:
  replicas: 2
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: levels-service
  template:
    metadata:
      labels:
        app: levels-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        traffic.sidecar.istio.io/excludeInboundPorts: "9090"
    spec:
      containers:
      - name: levels-service
        image: abbasajorloo/levels-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 50054
          name: grpc
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: db.host
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: db.port
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: metarang-secrets
              key: db.user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: metarang-secrets
              key: db.password
        - name: DB_DATABASE
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: db.database
        - name: GRPC_PORT
          value: "50054"
        - name: METRICS_PORT
          value: "9090"
        - name: COMMERCIAL_SERVICE_ADDR
          value: "commercial-service:50052"
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: metarang-secrets
              key: sentry.dsn
              optional: true
        - name: SENTRY_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: sentry.environment
        - name: SENTRY_RELEASE
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: sentry.release
              optional: true
        - name: SENTRY_TRACES_SAMPLE_RATE
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: sentry.traces_sample_rate
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        livenessProbe:
          exec:
            command: ["/bin/sh", "-c", "nc -z localhost 50054"]
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          exec:
            command: ["/bin/sh", "-c", "nc -z localhost 50054"]
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: levels-service
  namespace: metarang
  labels:
    app: levels-service
spec:
  type: ClusterIP
  ports:
  - port: 50054
    targetPort: 50054
    protocol: TCP
    name: grpc
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: levels-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: levels-service-hpa
  namespace: metarang
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: levels-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
