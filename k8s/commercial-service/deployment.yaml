apiVersion: apps/v1
kind: Deployment
metadata:
  name: commercial-service
  namespace: metarang
  labels:
    app: commercial-service
    version: v1
spec:
  replicas: 1
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: commercial-service
      version: v1
  template:
    metadata:
      labels:
        app: commercial-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        traffic.sidecar.istio.io/excludeInboundPorts: "9090"
    spec:
      imagePullSecrets:
        - name: dockerhub-credentials
      containers:
      - name: commercial-service
        image: abbasajorloo/commercial-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 50052
          name: grpc
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        env:
        - name: DB_HOST
          value: "mysql"
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: db.port
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: metarang-secrets
              key: db.user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: metarang-secrets
              key: db.password
        - name: DB_DATABASE
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: db.database
        - name: GRPC_PORT
          value: "50052"
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: metarang-secrets
              key: sentry.dsn
              optional: true
        - name: SENTRY_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: sentry.environment
        - name: SENTRY_RELEASE
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: sentry.release
              optional: true
        - name: SENTRY_TRACES_SAMPLE_RATE
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: sentry.traces_sample_rate
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command: ["/bin/sh", "-c", "nc -z localhost 50052"]
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 5
        readinessProbe:
          exec:
            command: ["/bin/sh", "-c", "nc -z localhost 50052"]
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 10
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: commercial-service
  namespace: metarang
  labels:
    app: commercial-service
spec:
  type: ClusterIP
  ports:
  - port: 50052
    targetPort: 50052
    protocol: TCP
    name: grpc
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: commercial-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: commercial-service-hpa
  namespace: metarang
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: commercial-service
  minReplicas: 1
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

