apiVersion: apps/v1
kind: Deployment
metadata:
  name: features-service
  namespace: metarang
  labels:
    app: features-service
    version: v1
spec:
  replicas: 1
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: features-service
      version: v1
  template:
    metadata:
      labels:
        app: features-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        traffic.sidecar.istio.io/excludeInboundPorts: "9090"
    spec:
      imagePullSecrets:
        - name: dockerhub-credentials
      containers:
      - name: features-service
        image: abbasajorloo/features-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 50053
          name: grpc
          protocol: TCP
        - containerPort: 8062
          name: http
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        env:
        - name: DB_HOST
          value: "mysql"
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: db.port
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: metarang-secrets
              key: db.user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: metarang-secrets
              key: db.password
        - name: DB_DATABASE
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: db.database
        - name: GRPC_PORT
          value: "50053"
        - name: HTTP_PORT
          value: "8062"
        - name: AUTH_SERVICE_ADDR
          value: "auth-service:50051"
        - name: APP_URL
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: app.url
              optional: true
        - name: METRICS_PORT
          value: "9090"
        - name: COMMERCIAL_SERVICE_ADDR
          value: "commercial-service:50052"
        - name: NOTIFICATIONS_SERVICE_ADDR
          value: "notifications-service:50058"
        - name: REDIS_ADDR
          value: "redis:6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: metarang-secrets
              key: redis.password
              optional: true
        - name: BROADCAST_CHANNEL
          value: "feature-events"
        - name: COMMERCIAL_SERVICE_TIMEOUT
          value: "3s"
        - name: COMMERCIAL_SERVICE_RETRIES
          value: "3"
        - name: THREE_D_META_URL
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: threed.meta.url
              optional: true
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: metarang-secrets
              key: sentry.dsn
              optional: true
        - name: SENTRY_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: sentry.environment
        - name: SENTRY_RELEASE
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: sentry.release
              optional: true
        - name: SENTRY_TRACES_SAMPLE_RATE
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: sentry.traces_sample_rate
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8062
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8062
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 10
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: features-service
  namespace: metarang
  labels:
    app: features-service
spec:
  type: ClusterIP
  ports:
  - port: 50053
    targetPort: 50053
    protocol: TCP
    name: grpc
  - port: 8062
    targetPort: 8062
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: features-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: features-service-hpa
  namespace: metarang
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: features-service
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
