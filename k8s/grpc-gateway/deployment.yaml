apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-gateway
  namespace: metarang
  labels:
    app: grpc-gateway
    version: v1
spec:
  replicas: 2
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: grpc-gateway
      version: v1
  template:
    metadata:
      labels:
        app: grpc-gateway
        version: v1
    spec:
      imagePullSecrets:
        - name: dockerhub-credentials
      containers:
      - name: grpc-gateway
        image: abbasajorloo/grpc-gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: HTTP_PORT
          value: "8080"
        - name: AUTH_SERVICE_ADDR
          value: "auth-service:50051"
        - name: DYNASTY_SERVICE_ADDR
          value: "dynasty-service:50055"
        - name: FINANCIAL_SERVICE_ADDR
          value: "financial-service:50062"
        - name: COMMERCIAL_SERVICE_ADDR
          value: "commercial-service:50052"
        - name: LEVELS_SERVICE_ADDR
          value: "levels-service:50054"
        - name: TRAINING_SERVICE_ADDR
          value: "training-service:50057"
        - name: SUPPORT_SERVICE_ADDR
          value: "support-service:50056"
        - name: NOTIFICATION_SERVICE_ADDR
          value: "notifications-service:50058"
        - name: SOCIAL_SERVICE_ADDR
          value: "social-service:50061"
        - name: STORAGE_SERVICE_ADDR
          value: "storage-service:8059"
        - name: INTERNAL_SERVICE_SECRET
          valueFrom:
            secretKeyRef:
              name: metarang-secrets
              key: internal.service.secret
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: metarang-secrets
              key: sentry.dsn
              optional: true
        - name: SENTRY_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: sentry.environment
        - name: SENTRY_RELEASE
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: sentry.release
              optional: true
        - name: SENTRY_TRACES_SAMPLE_RATE
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: sentry.traces_sample_rate
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: grpc-gateway
  namespace: metarang
  labels:
    app: grpc-gateway
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: grpc-gateway
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: grpc-gateway-hpa
  namespace: metarang
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: grpc-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
