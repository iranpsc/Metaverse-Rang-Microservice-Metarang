apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications-service
  namespace: metarang
  labels:
    app: notifications-service
    version: v1
spec:
  replicas: 1
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: notifications-service
      version: v1
  template:
    metadata:
      labels:
        app: notifications-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        traffic.sidecar.istio.io/excludeInboundPorts: "9090"
    spec:
      imagePullSecrets:
        - name: dockerhub-credentials
      containers:
      - name: notifications-service
        image: abbasajorloo/notifications-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 50058
          name: grpc
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        env:
        - name: DB_HOST
          value: "mysql"
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: db.port
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: metarang-secrets
              key: db.user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: metarang-secrets
              key: db.password
        - name: DB_DATABASE
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: db.database
        - name: DB_MAX_OPEN_CONNS
          value: "25"
        - name: DB_MAX_IDLE_CONNS
          value: "5"
        - name: DB_CONN_MAX_LIFETIME
          value: "5m"
        - name: GRPC_PORT
          value: "50058"
        - name: METRICS_PORT
          value: "9090"
        - name: REDIS_ADDR
          value: "redis:6379"
        - name: REDIS_DB
          value: "0"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: metarang-secrets
              key: redis.password
              optional: true
        - name: SMS_PROVIDER
          value: "kavenegar"
        - name: SMS_API_KEY
          valueFrom:
            secretKeyRef:
              name: metarang-secrets
              key: sms.api.key
              optional: true
        - name: INTERNAL_SERVICE_SECRET
          valueFrom:
            secretKeyRef:
              name: metarang-secrets
              key: internal.service.secret
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: metarang-secrets
              key: sentry.dsn
              optional: true
        - name: SENTRY_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: sentry.environment
        - name: SENTRY_RELEASE
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: sentry.release
              optional: true
        - name: SENTRY_TRACES_SAMPLE_RATE
          valueFrom:
            configMapKeyRef:
              name: metarang-config
              key: sentry.traces_sample_rate
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command: ["/bin/sh", "-c", "nc -z localhost 50058"]
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 5
        readinessProbe:
          exec:
            command: ["/bin/sh", "-c", "nc -z localhost 50058"]
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 10
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: notifications-service
  namespace: metarang
  labels:
    app: notifications-service
spec:
  type: ClusterIP
  ports:
  - port: 50058
    targetPort: 50058
    protocol: TCP
    name: grpc
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: notifications-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notifications-service-hpa
  namespace: metarang
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notifications-service
  minReplicas: 1
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
