apiVersion: v1
kind: ConfigMap
metadata:
  name: metarang-config
  namespace: metarang
data:
  # Database Configuration
  db.host: "mysql"
  db.port: "3306"
  db.database: "metarang_db"
  
  # Redis Configuration
  redis.host: "redis"
  redis.port: "6379"
  redis.db: "0"
  
  # OAuth Configuration
  oauth.server.url: "https://oauth.metarang.com"
  
  # Kong Gateway
  kong.admin.url: "http://kong-admin.metarang.svc.cluster.local:8001"
  
  # Application Settings
  app.environment: "production"
  app.log.level: "info"

  # Sentry Error Monitoring
  sentry.environment: "production"
  sentry.release: ""
  sentry.traces_sample_rate: "0"
