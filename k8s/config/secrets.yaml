apiVersion: v1
kind: Secret
metadata:
  name: metarang-secrets
  namespace: metarang
type: Opaque
stringData:
  # Database Credentials
  db.user: "metarang_user"
  db.password: "CHANGE_ME_IN_PRODUCTION"
  
  # OAuth Credentials
  oauth.client.id: "CHANGE_ME"
  oauth.client.secret: "CHANGE_ME"
  
  # Parsian Payment Gateway
  parsian.merchant.id: "CHANGE_ME"
  parsian.loan.merchant.id: "CHANGE_ME"
  
  # Redis Password
  redis.password: ""

  # Inter-service authentication
  internal.service.secret: "CHANGE_ME_IN_PRODUCTION"

  # SMS (Kavenegar)
  sms.api.key: ""

  # Sadad Payment Gateway
  sadad.merchant.id: ""
  sadad.terminal.id: ""
  sadad.transaction.key: ""
  sadad.payment.identity.rial: ""
  sadad.payment.identity.non_rial: ""

  # FTP / Storage
  ftp.user: ""
  ftp.password: ""

  # Sentry (DSN is public but stored here for centralized rotation)
  sentry.dsn: ""
