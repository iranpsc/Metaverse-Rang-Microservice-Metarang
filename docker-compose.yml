    develop:
      watch:
        - action: rebuild
          path: ./services/calendar-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Support Service - Tickets & Reports
  support-service:
    build:
      context: .
      dockerfile: ./services/support-service/Dockerfile
    container_name: metarang-support-service
    # gRPC is internal-only; reachable on metarang-network, not exposed on the host
    env_file:
      - ./services/support-service/config.env
    environment:
      GRPC_PORT: 50056
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metarang_db
      DB_USER: metarang_user
      DB_PASSWORD: metarang_password
      NOTIFICATION_SERVICE_ADDR: notifications-service:50058
      <<: [*sentry-environment, *internal-auth, *grpc-tls]
    depends_on:
      mysql:
        condition: service_healthy
      notifications-service:
        condition: service_started
    volumes:
      - *grpc-certs-mount
    networks:
      - metarang-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50056"]
      interval: 30s
      timeout: 3s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./services/support-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Social Service - Challenge quiz & user follow graph
  social-service:
    build:
      context: .
      dockerfile: ./services/social-service/Dockerfile
    container_name: metarang-social-service
    # gRPC is internal-only; reachable on metarang-network, not exposed on the host
    env_file:
      - ./services/social-service/config.env
    environment:
      GRPC_PORT: 50061
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metarang_db
      DB_USER: metarang_user
      DB_PASSWORD: metarang_password
      AUTH_SERVICE_ADDR: auth-service:50051
      COMMERCIAL_SERVICE_ADDR: commercial-service:50052
      LEVELS_SERVICE_ADDR: levels-service:50054
      <<: [*sentry-environment, *internal-auth, *grpc-tls]
    depends_on:
      mysql:
        condition: service_healthy
      auth-service:
        condition: service_started
      commercial-service:
        condition: service_healthy
      levels-service:
        condition: service_started
    volumes:
      - *grpc-certs-mount
    networks:
      - metarang-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50061"]
      interval: 30s
      timeout: 3s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./services/social-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Training Service - Video Tutorials & Comments
  training-service:
    build:
      context: .
      dockerfile: ./services/training-service/Dockerfile
    container_name: metarang-training-service
    # gRPC is internal-only; reachable on metarang-network, not exposed on the host
    env_file:
      - ./services/training-service/config.env
    environment:
      GRPC_PORT: 50057
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metarang_db
      DB_USER: metarang_user
      DB_PASSWORD: metarang_password
      AUTH_SERVICE_ADDR: auth-service:50051
      <<: [*sentry-environment, *internal-auth, *grpc-tls]
    depends_on:
      mysql:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    volumes:
      - *grpc-certs-mount
    networks:
      - metarang-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50057"]
      interval: 30s
      timeout: 3s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./services/training-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Notifications Service - Multi-channel Notifications
  notifications-service:
    build:
      context: .
      dockerfile: ./services/notifications-service/Dockerfile
    container_name: metarang-notifications-service
    # gRPC is internal-only; reachable on metarang-network, not exposed on the host
    env_file:
      - ./services/notifications-service/config.env
    environment:
      GRPC_PORT: 50058
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metarang_db
      DB_USER: metarang_user
      DB_PASSWORD: metarang_password
      DB_MAX_OPEN_CONNS: 25
      DB_MAX_IDLE_CONNS: 5
      DB_CONN_MAX_LIFETIME: 5m
      REDIS_ADDR: redis:6379
      REDIS_DB: 0
      <<: [*sentry-environment, *internal-auth, *grpc-tls]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - *grpc-certs-mount
    networks:
      - metarang-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50058"]
      interval: 30s
      timeout: 3s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./services/notifications-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Financial Service - Payment Processing & Transactions
  financial-service:
    build:
      context: .
      dockerfile: ./services/financial-service/Dockerfile
    container_name: metarang-financial-service
    # gRPC is internal-only; reachable on metarang-network, not exposed on the host
    env_file:
      - ./services/financial-service/config.env
    environment:
      GRPC_PORT: 50062
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metarang_db
      DB_USER: metarang_user
      DB_PASSWORD: metarang_password
      AUTH_SERVICE_ADDR: auth-service:50051
      COMMERCIAL_SERVICE_ADDR: commercial-service:50052
      NOTIFICATIONS_SERVICE_ADDR: notifications-service:50058
      <<: [*sentry-environment, *internal-auth, *grpc-tls]
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - *grpc-certs-mount
    networks:
      - metarang-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50062"]
      interval: 30s
      timeout: 3s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./services/financial-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Storage Service - File Upload & Management
  storage-service:
    build:
      context: .
      dockerfile: ./services/storage-service/Dockerfile
    container_name: metarang-storage-service
    ports:
      - "8059:8059"    # HTTP REST API port (uploads); gRPC stays internal-only
    volumes:
      - ./services/storage-service/uploads:/app/uploads
      - *grpc-certs-mount
    env_file:
      - ./services/storage-service/config.env
    environment:
      GRPC_PORT: 50060
      HTTP_PORT: 8059
      UPLOAD_DIR: /app/uploads
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metarang_db
      DB_USER: metarang_user
      DB_PASSWORD: metarang_password
      TEMP_DIR: /tmp/storage-chunks
      <<: [*sentry-environment, *internal-auth, *grpc-tls]
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - metarang-network
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./services/storage-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
            - "**/uploads"
        - action: rebuild
          path: ./shared

  # ============================================================================
  # Gateway Services
  # ============================================================================

  # WebSocket Gateway - Real-time Communication (Go)
  websocket-gateway:
    build:
      context: .
      dockerfile: ./services/websocket-gateway/Dockerfile
    container_name: metarang-websocket-gateway
    ports:
      - "3002:3002"
    env_file:
      - ./services/websocket-gateway/config.env
    environment:
      PORT: 3002
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_ADDR: auth-service:50051
      <<: [*sentry-environment, *grpc-tls]
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    volumes:
      - *grpc-certs-mount
    networks:
      - metarang-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./services/websocket-gateway
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Health Check Service - System Health Monitoring
  health-check-service:
    build:
      context: .
      dockerfile: ./services/health-check-service/Dockerfile
    container_name: metarang-health-check-service
    ports:
      - "8090:8090"
    networks:
      - metarang-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Swagger UI - OpenAPI documentation browser
  swagger-ui:
    image: swaggerapi/swagger-ui:v5.18.2
    container_name: metarang-swagger-ui
    environment:
      APP_URL: ${APP_URL:-http://localhost:8000}
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - "8081:8080"
    volumes:
      - ./openapi:/openapi-src:ro
      - ./scripts/swagger-ui-entrypoint.sh:/entrypoint.sh:ro
    networks:
      - metarang-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/openapi/openapi.yaml"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Kong API Gateway - HTTP to gRPC Translation
  kong:
    image: kong:3.9.3
    container_name: metarang-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 127.0.0.1:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    ports:
      - "8000:8000" # Proxy port (main API endpoint)
      # Admin API listens on 127.0.0.1:8001 inside the container only — not exposed on the host
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
      - ./shared/proto:/kong/protos:ro
    depends_on:
      grpc-gateway:
        condition: service_healthy
      auth-service:
        condition: service_started
      commercial-service:
        condition: service_started
      features-service:
        condition: service_healthy
      levels-service:
        condition: service_started
      dynasty-service:
        condition: service_started
      calendar-service:
        condition: service_started
      support-service:
        condition: service_started
      training-service:
        condition: service_started
      notifications-service:
        condition: service_started
      storage-service:
        condition: service_started
      financial-service:
        condition: service_started
      social-service:
        condition: service_started
    networks:
      - metarang-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Monitoring Stack
  # ============================================================================

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:v2.53.5
    container_name: metarang-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - metarang-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Grafana - Visualization & Dashboards
  grafana:
    image: grafana/grafana:11.6.16
    container_name: metarang-grafana
    ports:
      - "3001:3001"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-metarang-local-dev-grafana-password-change-in-production}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3001"
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - metarang-network
    restart: unless-stopped
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Node Exporter - Host-level infrastructure metrics (CPU, Memory, Disk, Network)
  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: metarang-node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - metarang-network
    restart: unless-stopped
    healthcheck:
      # Probe / (not /metrics): wget --spider aborts early and node-exporter logs
      # "connection reset by peer" while still writing the large metrics payload.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9100/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Note: cAdvisor removed due to Windows/Docker Desktop compatibility issues
  # Node Exporter provides host-level infrastructure metrics (CPU, Memory, Disk, Network)
  # For container-level metrics on Windows, consider using Docker Desktop's built-in metrics

volumes:
  mysql_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  metarang-network:
    driver: bridge

