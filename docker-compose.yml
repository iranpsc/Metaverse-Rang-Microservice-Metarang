x-sentry-environment: &sentry-environment
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-}
  SENTRY_RELEASE: ${SENTRY_RELEASE:-}
  SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}

x-internal-auth: &internal-auth
  INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-metarang-local-dev-service-secret-change-in-production}

x-grpc-tls: &grpc-tls
  GRPC_TLS_ENABLED: ${GRPC_TLS_ENABLED:-false}
  GRPC_TLS_CERT_FILE: ${GRPC_TLS_CERT_FILE:-/certs/server.crt}
  GRPC_TLS_KEY_FILE: ${GRPC_TLS_KEY_FILE:-/certs/server.key}
  GRPC_TLS_CA_FILE: ${GRPC_TLS_CA_FILE:-/certs/ca.crt}
  GRPC_TLS_CLIENT_CERT_FILE: ${GRPC_TLS_CLIENT_CERT_FILE:-/certs/client.crt}
  GRPC_TLS_CLIENT_KEY_FILE: ${GRPC_TLS_CLIENT_KEY_FILE:-/certs/client.key}

# Host certs from scripts/generate-grpc-certs.sh → container /certs
x-grpc-certs-mount: &grpc-certs-mount ./certs/grpc:/certs:ro

services:
  # ============================================================================
  # Infrastructure Services
  # ============================================================================
  
  # MySQL Database (shared)
  mysql:
    image: mysql:8.0.43
    container_name: metarang-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: metarang_db
      MYSQL_USER: metarang_user
      MYSQL_PASSWORD: metarang_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - metarang-network
    command: 
      - --host-cache-size=0
      - --pid-file=/tmp/mysqld.pid
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Redis (for pub/sub and caching)
  redis:
    image: redis:7.4-alpine
    container_name: metarang-redis
    ports:
      - "6379:6379"
    networks:
      - metarang-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # Core Microservices
  # ============================================================================

  # Auth Service - Authentication & User Management
  auth-service:
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
    container_name: metarang-auth-service
    # gRPC is internal-only; reachable on metarang-network, not exposed on the host
    env_file:
      - ./services/auth-service/config.env
    environment:
      GRPC_PORT: 50051
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metarang_db
      DB_USER: metarang_user
      DB_PASSWORD: metarang_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      NOTIFICATIONS_SERVICE_ADDR: notifications-service:50058
      LEVELS_SERVICE_ADDR: levels-service:50054
      FEATURES_SERVICE_ADDR: features-service:50053
      COMMERCIAL_SERVICE_ADDR: commercial-service:50052
      <<: [*sentry-environment, *internal-auth, *grpc-tls]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      notifications-service:
        condition: service_started
      commercial-service:
        condition: service_healthy
    volumes:
      - *grpc-certs-mount
    networks:
      - metarang-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50051"]
      interval: 30s
      timeout: 3s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./services/auth-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # gRPC Gateway Service - REST to gRPC Translation
  grpc-gateway:
    build:
      context: .
      dockerfile: ./services/grpc-gateway/Dockerfile
    container_name: metarang-grpc-gateway
    # No host port mapping — API is exposed via Kong on :8000
    env_file:
      - ./services/grpc-gateway/config.env
    environment:
      HTTP_PORT: 8080
      AUTH_SERVICE_ADDR: auth-service:50051
      DYNASTY_SERVICE_ADDR: dynasty-service:50055
      FINANCIAL_SERVICE_ADDR: financial-service:50062
      COMMERCIAL_SERVICE_ADDR: commercial-service:50052
      LEVELS_SERVICE_ADDR: levels-service:50054
      TRAINING_SERVICE_ADDR: training-service:50057
      SUPPORT_SERVICE_ADDR: support-service:50056
      SOCIAL_SERVICE_ADDR: social-service:50061
      NOTIFICATION_SERVICE_ADDR: notifications-service:50058
      STORAGE_SERVICE_ADDR: storage-service:8059
      <<: [*sentry-environment, *internal-auth, *grpc-tls]
    depends_on:
      auth-service:
        condition: service_started
      commercial-service:
        condition: service_started
      financial-service:
        condition: service_started
      training-service:
        condition: service_started
      storage-service:
        condition: service_started
      levels-service:
        condition: service_started
      social-service:
        condition: service_started
    volumes:
      - *grpc-certs-mount
    networks:
      - metarang-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    develop:
      watch:
        - action: rebuild
          path: ./services/grpc-gateway
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Commercial Service - Wallets & Transactions
  commercial-service:
    build:
      context: .
      dockerfile: ./services/commercial-service/Dockerfile
    container_name: metarang-commercial-service
    # gRPC is internal-only; reachable on metarang-network, not exposed on the host
    env_file:
      - ./services/commercial-service/config.env
    environment:
      GRPC_PORT: 50052
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metarang_db
      DB_USER: metarang_user
      DB_PASSWORD: metarang_password
      AUTH_SERVICE_ADDR: auth-service:50051
      <<: [*sentry-environment, *internal-auth, *grpc-tls]
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50052"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - *grpc-certs-mount
    networks:
      - metarang-network
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./services/commercial-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Features Service - Feature/Land Management
  features-service:
    build:
      context: .
      dockerfile: ./services/features-service/Dockerfile
    container_name: metarang-features-service
    # gRPC/HTTP are internal-only; public API is via Kong on :8000
    env_file:
      - ./services/features-service/config.env
    environment:
      GRPC_PORT: 50053
      HTTP_PORT: 8062
      AUTH_SERVICE_ADDR: auth-service:50051
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metarang_db
      DB_USER: metarang_user
      DB_PASSWORD: metarang_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      COMMERCIAL_SERVICE_ADDR: commercial-service:50052
      <<: [*sentry-environment, *internal-auth, *grpc-tls]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      commercial-service:
        condition: service_started
      auth-service:
        condition: service_started
    volumes:
      - *grpc-certs-mount
    networks:
      - metarang-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8062/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    develop:
      watch:
        - action: rebuild
          path: ./services/features-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Levels Service - User Progression & Activities
  levels-service:
    build:
      context: .
      dockerfile: ./services/levels-service/Dockerfile
    container_name: metarang-levels-service
    # gRPC is internal-only; reachable on metarang-network, not exposed on the host
    env_file:
      - ./services/levels-service/config.env
    environment:
      GRPC_PORT: 50054
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metarang_db
      DB_USER: metarang_user
      DB_PASSWORD: metarang_password
      <<: [*sentry-environment, *internal-auth, *grpc-tls]
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - *grpc-certs-mount
    networks:
      - metarang-network
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./services/levels-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Dynasty Service - Family & Dynasty Management
  dynasty-service:
    build:
      context: .
      dockerfile: ./services/dynasty-service/Dockerfile
    container_name: metarang-dynasty-service
    # gRPC is internal-only; reachable on metarang-network, not exposed on the host
    env_file:
      - ./services/dynasty-service/config.env
    environment:
      GRPC_PORT: 50055
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metarang_db
      DB_USER: metarang_user
      DB_PASSWORD: metarang_password
      COMMERCIAL_SERVICE_ADDR: commercial-service:50052
      NOTIFICATION_SERVICE_ADDR: notifications-service:50058
      AUTH_SERVICE_ADDR: auth-service:50051
      FEATURES_SERVICE_ADDR: features-service:50053
      <<: [*sentry-environment, *internal-auth, *grpc-tls]
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - *grpc-certs-mount
    networks:
      - metarang-network
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./services/dynasty-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Calendar Service - Events Management (gRPC internal + HTTP for Kong /api/calendar)
  calendar-service:
    build:
      context: .
      dockerfile: ./services/calendar-service/Dockerfile
    container_name: metarang-calendar-service
    # gRPC/HTTP are internal-only; public API is via Kong on :8000
    env_file:
      - ./services/calendar-service/config.env
    environment:
      GRPC_PORT: 50059
      HTTP_PORT: 8060
      AUTH_SERVICE_ADDR: auth-service:50051
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metarang_db
      DB_USER: metarang_user
      DB_PASSWORD: metarang_password
      <<: [*sentry-environment, *internal-auth, *grpc-tls]
    depends_on:
      mysql:
        condition: service_healthy
      auth-service:
        condition: service_started
    volumes:
      - *grpc-certs-mount
    networks:
      - metarang-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8060/health"]
      interval: 30s
      timeout: 3s
      retries: 3
