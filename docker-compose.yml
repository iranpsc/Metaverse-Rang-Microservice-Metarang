services:
  # ============================================================================
  # Infrastructure Services
  # ============================================================================
  
  # MySQL Database (shared)
  mysql:
    image: docker.arvancloud.ir/mysql:8.0
    container_name: metargb-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: metargb_db
      MYSQL_USER: metargb_user
      MYSQL_PASSWORD: metargb_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - metargb-network
    command: 
      - --host-cache-size=0
      - --pid-file=/tmp/mysqld.pid
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Redis (for pub/sub and caching)
  redis:
    image: docker.arvancloud.ir/redis:7-alpine
    container_name: metargb-redis
    ports:
      - "6379:6379"
    networks:
      - metargb-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # Core Microservices
  # ============================================================================

  # Auth Service - Authentication & User Management
  auth-service:
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
    container_name: metargb-auth-service
    ports:
      - "50051:50051"
    env_file:
      - ./services/auth-service/config.env
    environment:
      GRPC_PORT: 50051
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metargb_db
      DB_USER: metargb_user
      DB_PASSWORD: metargb_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      NOTIFICATIONS_SERVICE_ADDR: notifications-service:50058
      LEVELS_SERVICE_ADDR: levels-service:50054
      FEATURES_SERVICE_ADDR: features-service:50053
      COMMERCIAL_SERVICE_ADDR: commercial-service:50052
      # OAUTH_SERVER_URL, OAUTH_CLIENT_ID, and OAUTH_CLIENT_SECRET are loaded from config.env via env_file
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      notifications-service:
        condition: service_started
      commercial-service:
        condition: service_healthy
    networks:
      - metargb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50051"]
      interval: 30s
      timeout: 3s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./services/auth-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # gRPC Gateway Service - REST to gRPC Translation
  grpc-gateway:
    build:
      context: .
      dockerfile: ./services/grpc-gateway/Dockerfile
    container_name: metargb-grpc-gateway
    ports:
      - "8080:8080"
    env_file:
      - ./services/grpc-gateway/config.env
    environment:
      HTTP_PORT: 8080
      AUTH_SERVICE_ADDR: auth-service:50051
      CALENDAR_SERVICE_ADDR: calendar-service:50059
      DYNASTY_SERVICE_ADDR: dynasty-service:50055
      FEATURES_SERVICE_ADDR: features-service:50053
      FINANCIAL_SERVICE_ADDR: financial-service:50062
      COMMERCIAL_SERVICE_ADDR: commercial-service:50052
      LEVELS_SERVICE_ADDR: levels-service:50054
      TRAINING_SERVICE_ADDR: training-service:50057
      SUPPORT_SERVICE_ADDR: support-service:50056
      NOTIFICATION_SERVICE_ADDR: notifications-service:50058
      SOCIAL_SERVICE_ADDR: social-service:50061
      STORAGE_SERVICE_ADDR: storage-service:8059
    depends_on:
      auth-service:
        condition: service_started
      commercial-service:
        condition: service_started
      training-service:
        condition: service_started
      storage-service:
        condition: service_started
      levels-service:
        condition: service_started
      social-service:
        condition: service_started
    networks:
      - metargb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    develop:
      watch:
        - action: rebuild
          path: ./services/grpc-gateway
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Commercial Service - Wallets & Transactions
  commercial-service:
    build:
      context: .
      dockerfile: ./services/commercial-service/Dockerfile
    container_name: metargb-commercial-service
    ports:
      - "50052:50052"
    env_file:
      - ./services/commercial-service/config.env
    environment:
      GRPC_PORT: 50052
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metargb_db
      DB_USER: metargb_user
      DB_PASSWORD: metargb_password
      AUTH_SERVICE_ADDR: auth-service:50051
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50052"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - metargb-network
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./services/commercial-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Features Service - Feature/Land Management
  features-service:
    build:
      context: .
      dockerfile: ./services/features-service/Dockerfile
    container_name: metargb-features-service
    ports:
      - "50053:50053"
    env_file:
      - ./services/features-service/config.env
    environment:
      GRPC_PORT: 50053
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metargb_db
      DB_USER: metargb_user
      DB_PASSWORD: metargb_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      COMMERCIAL_SERVICE_ADDR: commercial-service:50052
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      commercial-service:
        condition: service_started
    networks:
      - metargb-network
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./services/features-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Levels Service - User Progression & Activities
  levels-service:
    build:
      context: .
      dockerfile: ./services/levels-service/Dockerfile
    container_name: metargb-levels-service
    ports:
      - "50054:50054"
    env_file:
      - ./services/levels-service/config.env
    environment:
      GRPC_PORT: 50054
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metargb_db
      DB_USER: metargb_user
      DB_PASSWORD: metargb_password
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - metargb-network
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./services/levels-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Dynasty Service - Family & Dynasty Management
  dynasty-service:
    build:
      context: .
      dockerfile: ./services/dynasty-service/Dockerfile
    container_name: metargb-dynasty-service
    ports:
      - "50055:50055"
    env_file:
      - ./services/dynasty-service/config.env
    environment:
      GRPC_PORT: 50055
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metargb_db
      DB_USER: metargb_user
      DB_PASSWORD: metargb_password
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - metargb-network
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./services/dynasty-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Calendar Service - Events Management
  calendar-service:
    build:
      context: .
      dockerfile: ./services/calendar-service/Dockerfile
    container_name: metargb-calendar-service
    ports:
      - "50059:50059"
    env_file:
      - ./services/calendar-service/config.env
    environment:
      GRPC_PORT: 50059
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metargb_db
      DB_USER: metargb_user
      DB_PASSWORD: metargb_password
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - metargb-network
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./services/calendar-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Support Service - Tickets & Reports
  support-service:
    build:
      context: .
      dockerfile: ./services/support-service/Dockerfile
    container_name: metargb-support-service
    ports:
      - "50056:50056"
    env_file:
      - ./services/support-service/config.env
    environment:
      GRPC_PORT: 50056
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metargb_db
      DB_USER: metargb_user
      DB_PASSWORD: metargb_password
      NOTIFICATION_SERVICE_ADDR: notifications-service:50058
    depends_on:
      mysql:
        condition: service_healthy
      notifications-service:
        condition: service_started
    networks:
      - metargb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50056"]
      interval: 30s
      timeout: 3s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./services/support-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Training Service - Video Tutorials & Comments
  training-service:
    build:
      context: .
      dockerfile: ./services/training-service/Dockerfile
    container_name: metargb-training-service
    ports:
      - "50057:50057"
    env_file:
      - ./services/training-service/config.env
    environment:
      GRPC_PORT: 50057
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metargb_db
      DB_USER: metargb_user
      DB_PASSWORD: metargb_password
      AUTH_SERVICE_ADDR: auth-service:50051
    depends_on:
      mysql:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - metargb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50057"]
      interval: 30s
      timeout: 3s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./services/training-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Notifications Service - Multi-channel Notifications
  notifications-service:
    build:
      context: .
      dockerfile: ./services/notifications-service/Dockerfile
    container_name: metargb-notifications-service
    ports:
      - "50058:50058"
    env_file:
      - ./services/notifications-service/config.env
    environment:
      GRPC_PORT: 50058
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metargb_db
      DB_USER: metargb_user
      DB_PASSWORD: metargb_password
      DB_MAX_OPEN_CONNS: 25
      DB_MAX_IDLE_CONNS: 5
      DB_CONN_MAX_LIFETIME: 5m
      REDIS_ADDR: redis:6379
      REDIS_DB: 0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - metargb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50058"]
      interval: 30s
      timeout: 3s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./services/notifications-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Social Service - Follow relationships & Challenge quiz
  social-service:
    build:
      context: .
      dockerfile: ./services/social-service/Dockerfile
    container_name: metargb-social-service
    ports:
      - "50061:50061"
    env_file:
      - ./services/social-service/config.env
    environment:
      GRPC_PORT: 50061
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metargb_db
      DB_USER: metargb_user
      DB_PASSWORD: metargb_password
      COMMERCIAL_SERVICE_ADDR: commercial-service:50052
    depends_on:
      mysql:
        condition: service_healthy
      commercial-service:
        condition: service_started
    networks:
      - metargb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50061"]
      interval: 30s
      timeout: 3s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./services/social-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Financial Service - Payment Processing & Transactions
  financial-service:
    build:
      context: .
      dockerfile: ./services/financial-service/Dockerfile
    container_name: metargb-financial-service
    ports:
      - "50062:50062"
    env_file:
      - ./services/financial-service/config.env
    environment:
      GRPC_PORT: 50062
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metargb_db
      DB_USER: metargb_user
      DB_PASSWORD: metargb_password
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PARSIAN_CALLBACK_URL: ${FRONTEND_URL:-http://localhost:3000}/api/parsian/callback
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - metargb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50062"]
      interval: 30s
      timeout: 3s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./services/financial-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
        - action: rebuild
          path: ./shared

  # Storage Service - File Upload & Management
  storage-service:
    build:
      context: .
      dockerfile: ./services/storage-service/Dockerfile
    container_name: metargb-storage-service
    ports:
      - "50060:50060"  # gRPC port
      - "8059:8059"    # HTTP REST API port
    volumes:
      - ./services/storage-service/uploads:/app/uploads
    env_file:
      - ./services/storage-service/config.env
    environment:
      GRPC_PORT: 50060
      HTTP_PORT: 8059
      UPLOAD_DIR: /app/uploads
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: metargb_db
      DB_USER: metargb_user
      DB_PASSWORD: metargb_password
      TEMP_DIR: /tmp/storage-chunks
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - metargb-network
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./services/storage-service
          ignore:
            - "**/_test.go"
            - "**/tmp"
            - "**/.git"
            - "**/uploads"
        - action: rebuild
          path: ./shared

  # ============================================================================
  # Gateway Services
  # ============================================================================

  # WebSocket Gateway - Real-time Communication
  websocket-gateway:
    build:
      context: .
      dockerfile: ./websocket-gateway/Dockerfile
    container_name: metargb-websocket-gateway
    ports:
      - "3002:3002"
    env_file:
      - ./websocket-gateway/config.env
    environment:
      PORT: 3002
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_ADDR: auth-service:50051
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - metargb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    develop:
      watch:
        - action: sync+restart
          path: ./websocket-gateway
          target: /app
          ignore:
            - "**/node_modules"
            - "**/.git"
        - action: rebuild
          path: ./websocket-gateway/package.json
        - action: rebuild
          path: ./websocket-gateway/package-lock.json

  # Health Check Service - System Health Monitoring
  health-check-service:
    build:
      context: .
      dockerfile: ./services/health-check-service/Dockerfile
    container_name: metargb-health-check-service
    ports:
      - "8090:8090"
    networks:
      - metargb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Kong API Gateway - HTTP to gRPC Translation
  kong:
    image: docker.arvancloud.ir/kong:3.4
    container_name: metargb-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    ports:
      - "8000:8000" # Proxy port (main API endpoint)
      - "8001:8001" # Admin API
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
      - ./shared/proto:/kong/protos:ro
    depends_on:
      grpc-gateway:
        condition: service_healthy
      auth-service:
        condition: service_started
      commercial-service:
        condition: service_started
      features-service:
        condition: service_started
      levels-service:
        condition: service_started
      dynasty-service:
        condition: service_started
      calendar-service:
        condition: service_started
      support-service:
        condition: service_started
      training-service:
        condition: service_started
      notifications-service:
        condition: service_started
      storage-service:
        condition: service_started
      financial-service:
        condition: service_started
      social-service:
        condition: service_started
    networks:
      - metargb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Monitoring Stack
  # ============================================================================

  # Prometheus - Metrics Collection
  prometheus:
    image: docker.arvancloud.ir/prom/prometheus:v2.53.0
    container_name: metargb-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - metargb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Grafana - Visualization & Dashboards
  grafana:
    image: docker.arvancloud.ir/grafana/grafana:10.1.5
    container_name: metargb-grafana
    ports:
      - "3001:3001"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=3001
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - metargb-network
    restart: unless-stopped
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Node Exporter - Host-level infrastructure metrics (CPU, Memory, Disk, Network)
  node-exporter:
    image: docker.arvancloud.ir/prom/node-exporter:v1.6.1
    container_name: metargb-node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - metargb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Note: cAdvisor removed due to Windows/Docker Desktop compatibility issues
  # Node Exporter provides host-level infrastructure metrics (CPU, Memory, Disk, Network)
  # For container-level metrics on Windows, consider using Docker Desktop's built-in metrics

volumes:
  mysql_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  metargb-network:
    driver: bridge

