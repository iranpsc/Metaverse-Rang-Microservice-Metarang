version: "2"

run:
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - metarang

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    staticcheck:
      checks:
        - all
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - text: "could not import"
      - text: "no required module provides package"
      - text: "missing metadata for import"
      - text: "packages.Load error"
      - text: "conflicting replacements"
      - text: "initialization failed"
      - text: "exit status 1"
      - text: "replacement directory.*does not exist"
      - text: "use.*go work edit.*to resolve"
