name: Service CI (Reusable)

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      enable_deploy:
        required: false
        type: boolean
        default: true
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      KUBE_CONFIG:
        required: false
      CODECOV_TOKEN:
        required: false

env:
  DOCKER_REGISTRY: metarang
  GO_VERSION_FILE: services/${{ inputs.service_name }}/go.mod
  GOLANGCI_LINT_VERSION: v2.9.0
  GOVULNCHECK_VERSION: v1.1.4

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: |
            services/${{ inputs.service_name }}/go.sum
            shared/go.sum
            tests/${{ inputs.service_name }}/go.sum

      - name: Verify dependencies
        run: |
          cd services/${{ inputs.service_name }}
          go mod download
          go mod verify

      - name: Run linter
        uses: golangci/golangci-lint-action@d583c34f0599d37dbac4a198b9c83201be380893 # v9.3.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: services/${{ inputs.service_name }}
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: metarang_test
      DB_USER: test_user
      DB_PASSWORD: test_password
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: metarang_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: |
            services/${{ inputs.service_name }}/go.sum
            shared/go.sum
            tests/${{ inputs.service_name }}/go.sum

      - name: Setup test database
        uses: ./.github/actions/setup-test-db

      - name: Run unit tests
        run: |
          cd services/${{ inputs.service_name }}
          go test ./internal/... -v -race -coverprofile=coverage.out -covermode=atomic
          if [ -f "../../tests/${{ inputs.service_name }}/go.mod" ]; then
            cd "../../tests/${{ inputs.service_name }}"
            GOWORK=off go test ./... -v -race
          fi

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
          cd services/${{ inputs.service_name }}
          govulncheck ./...

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@5975040f7f7d40edaff8d784b576fd65ae95c073 # v5.5.5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./services/${{ inputs.service_name }}/coverage.out
          flags: ${{ inputs.service_name }}
          name: ${{ inputs.service_name }}
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ inputs.service_name }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./services/${{ inputs.service_name }}/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ inputs.service_name }}
          cache-to: type=gha,scope=${{ inputs.service_name }},mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@1f0aa582c8c8f5f7639610d6d38baddfea4fdcee # v0.9.2
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ inputs.service_name }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "$TAGS" | while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              docker push "$tag"
            fi
          done

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: inputs.enable_deploy && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment:
      name: production

    steps:
      - name: Configure kubectl
        uses: azure/k8s-set-context@ae59a723ba9abe7a9655538854a025448dbab4aa # v4.0.2
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Update deployment image
        run: |
          kubectl set image deployment/${{ inputs.service_name }} \
            ${{ inputs.service_name }}=${{ env.DOCKER_REGISTRY }}/${{ inputs.service_name }}:${{ github.sha }} \
            -n metarang

      - name: Verify rollout
        run: kubectl rollout status deployment/${{ inputs.service_name }} -n metarang --timeout=5m

      - name: Run smoke tests
        run: |
          for i in $(seq 1 30); do
            if kubectl exec -n metarang deployment/${{ inputs.service_name }} -- curl -sf http://localhost:8080/health; then
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed after 60 seconds"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/${{ inputs.service_name }} -n metarang
          kubectl rollout status deployment/${{ inputs.service_name }} -n metarang
