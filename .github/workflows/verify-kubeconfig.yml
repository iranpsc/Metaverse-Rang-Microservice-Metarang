name: Verify Kubeconfig

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify production KUBE_CONFIG
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Configure kubectl
        uses: azure/k8s-set-context@ae59a723ba9abe7a9655538854a025448dbab4aa # v4.0.2
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Report kubeconfig target
        run: |
          SERVER=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')
          CONTEXT=$(kubectl config view --minify -o jsonpath='{.current-context}')
          USER=$(kubectl config view --minify -o jsonpath='{.users[0].name}')
          echo "Configured server: ${SERVER}"
          echo "Current context: ${CONTEXT}"
          echo "User: ${USER}"

      - name: Test cluster connectivity
        run: kubectl cluster-info
