name: Integration Tests

on:
  push:
    paths:
      - 'services/**'
      - 'shared/**'
      - 'tests/**'
      - 'scripts/schema.sql'
      - '.github/workflows/integration-tests.yml'
      - '.github/actions/setup-test-db/**'
    branches:
      - main
      - develop
  pull_request:
    paths:
      - 'services/**'
      - 'shared/**'
      - 'tests/**'
      - 'scripts/schema.sql'
    branches:
      - main
      - develop
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  integration-tests:
    name: Run Integration Test Suite
    runs-on: ubuntu-latest

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: metarang_test
      DB_USER: test_user
      DB_PASSWORD: test_password
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: metarang_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: tests/integration/go.mod
          cache-dependency-path: |
            tests/integration/go.sum
            tests/database/go.sum
            shared/go.sum

      - name: Setup test database
        uses: ./.github/actions/setup-test-db

      - name: Build all services
        run: |
          for service in services/*/; do
            if [ -f "$service/go.mod" ]; then
              echo "Building $(basename "$service")..."
              (cd "$service" && go build -o ./bin/server ./cmd/server/main.go)
            fi
          done

      - name: Start services
        id: start_services
        run: |
          for service in services/*/; do
            if [ -f "$service/bin/server" ]; then
              service_name=$(basename "$service")
              echo "Starting $service_name..."
              (cd "$service" && ./bin/server > "/tmp/${service_name}.log" 2>&1 & echo $! > "/tmp/${service_name}.pid")
            fi
          done

          echo "Waiting for services to become ready..."
          sleep 15

          failed=0
          for pid_file in /tmp/*.pid; do
            if [ -f "$pid_file" ]; then
              service_name=$(basename "$pid_file" .pid)
              if ! kill -0 "$(cat "$pid_file")" 2>/dev/null; then
                echo "::error::$service_name exited during startup:"
                tail -n 50 "/tmp/${service_name}.log" || true
                failed=1
              fi
            fi
          done
          exit $failed

      - name: Run integration tests
        run: |
          cd tests/integration
          go test -v -timeout 10m ./...

      - name: Run wallet concurrency tests
        run: |
          cd tests/database
          go test -v -run TestWalletConcurrency

      - name: Run golden JSON tests
        run: |
          cd tests/golden
          go test -v -timeout 5m ./...

      - name: Upload golden test report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: golden-test-diffs
          path: tests/golden/diffs/
          if-no-files-found: ignore

      - name: Stop services
        if: always()
        run: |
          for pid_file in /tmp/*.pid; do
            if [ -f "$pid_file" ]; then
              kill "$(cat "$pid_file")" 2>/dev/null || true
            fi
          done

      - name: Upload service logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: service-startup-logs
          path: /tmp/*.log
          if-no-files-found: ignore
