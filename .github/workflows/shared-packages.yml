name: Shared Packages CI

on:
  push:
    paths:
      - 'shared/**'
      - '.github/workflows/shared-packages.yml'
    branches:
      - main
      - develop
  pull_request:
    paths:
      - 'shared/**'
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: shared-packages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test-shared:
    name: Test Shared Packages
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: metarang_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: shared/go.mod
          cache-dependency-path: shared/go.sum

      - name: Install dependencies
        run: |
          cd shared
          go mod download
          go mod verify

      - name: Run linter
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.9.0
          working-directory: shared
          args: --timeout=5m

      - name: Run tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: metarang_test
          DB_USER: root
          DB_PASSWORD: root_password
        run: |
          cd shared
          go test ./pkg/... -v -race -coverprofile=coverage.out -covermode=atomic

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          cd shared
          govulncheck ./...

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./shared/coverage.out
          flags: shared
          name: shared-packages
          fail_ci_if_error: false
