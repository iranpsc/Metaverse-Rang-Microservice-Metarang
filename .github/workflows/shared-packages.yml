name: Shared Packages CI

on:
  push:
    paths:
      - 'shared/**'
      - '.github/workflows/shared-packages.yml'
    branches:
      - main
      - develop
  pull_request:
    paths:
      - 'shared/**'
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: shared-packages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test-shared:
    name: Test Shared Packages
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: metarang_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: shared/go.mod
          cache-dependency-path: shared/go.sum

      - name: Install dependencies
        run: |
          cd shared
          go mod download
          go mod verify

      - name: Run linter
        uses: golangci/golangci-lint-action@d583c34f0599d37dbac4a198b9c83201be380893 # v9.3.0
        with:
          version: v2.9.0
          working-directory: shared
          args: --timeout=5m

      - name: Run tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: metarang_test
          DB_USER: root
          DB_PASSWORD: root_password
        run: |
          cd shared
          go test ./pkg/... -v -race -coverprofile=coverage.out -covermode=atomic

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          cd shared
          govulncheck ./...

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@5975040f7f7d40edaff8d784b576fd65ae95c073 # v5.5.5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./shared/coverage.out
          flags: shared
          name: shared-packages
          fail_ci_if_error: false
