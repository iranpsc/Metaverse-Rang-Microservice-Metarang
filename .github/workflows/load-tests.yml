name: Load Tests

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Test duration (e.g., 5m, 10m)'
        required: false
        default: '5m'
      vus:
        description: 'Number of virtual users'
        required: false
        default: '100'
  schedule:
    - cron: '0 3 * * 0'

env:
  K6_VERSION: '0.48.0'

permissions:
  contents: read

concurrency:
  group: load-tests
  cancel-in-progress: false

jobs:
  load-test:
    name: Run Load Tests
    runs-on: ubuntu-latest
    environment:
      name: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install k6
        run: |
          curl -fsSL "https://github.com/grafana/k6/releases/download/v${K6_VERSION}/k6-v${K6_VERSION}-linux-amd64.tar.gz" -o k6.tar.gz
          tar xzf k6.tar.gz
          sudo mv "k6-v${K6_VERSION}-linux-amd64/k6" /usr/local/bin/k6
          k6 version

      - name: Configure kubectl
        uses: azure/k8s-set-context@8698eba2499e9012f0d5085f8798077cce4bc526 # v5.0.1
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Get service endpoints
        id: endpoints
        run: |
          KONG_URL=$(kubectl get svc kong-proxy -n metarang -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          if [ -z "$KONG_URL" ]; then
            echo "Failed to resolve Kong load balancer IP"
            exit 1
          fi
          echo "kong_url=http://${KONG_URL}" >> "$GITHUB_OUTPUT"

      - name: Run auth service load test
        env:
          DURATION: ${{ github.event.inputs.duration || '5m' }}
          VUS: ${{ github.event.inputs.vus || '100' }}
          API_URL: ${{ steps.endpoints.outputs.kong_url }}
        run: |
          k6 run \
            --duration="$DURATION" \
            --vus="$VUS" \
            --out "json=results-auth.json" \
            tests/load/auth_test.js

      - name: Run features service load test
        env:
          DURATION: ${{ github.event.inputs.duration || '5m' }}
          VUS: ${{ github.event.inputs.vus || '100' }}
          API_URL: ${{ steps.endpoints.outputs.kong_url }}
        run: |
          k6 run \
            --duration="$DURATION" \
            --vus="$VUS" \
            --out "json=results-features.json" \
            tests/load/features_test.js

      - name: Run commercial service load test
        env:
          DURATION: ${{ github.event.inputs.duration || '5m' }}
          VUS: ${{ github.event.inputs.vus || '100' }}
          API_URL: ${{ steps.endpoints.outputs.kong_url }}
        run: |
          k6 run \
            --duration="$DURATION" \
            --vus="$VUS" \
            --out "json=results-commercial.json" \
            tests/load/commercial_test.js

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: load-test-results
          path: results-*.json
          if-no-files-found: ignore

      - name: Check performance thresholds
        run: python3 tests/load/check_thresholds.py results-*.json
