[pytest]
DJANGO_SETTINGS_MODULE = core.settings
python_files = test_*.py *_test.py
addopts = 
    --reuse-db
    --create-db
    --cov=articles
    --cov-report=html
    --cov-report=term
    --cov-report=xml
    -v
    --strict-markers
    -p no:warnings
markers =
    slow: marks tests as slow
    integration: integration tests
    unit: unit tests
    model: model tests
    view: view tests
    serializer: serializer tests